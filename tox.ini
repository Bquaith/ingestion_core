[tox]
min_version = 4.11
env_list =
    unit
    integration
skip_missing_interpreters = true

[testenv]
description = Base test environment
base_python = python3.12
package = editable
deps =
    -r requirements-test.txt
pass_env =
    TEST_SOURCE_DSN
    TEST_TARGET_DSN

[testenv:unit]
description = Run unit tests (integration excluded)
commands =
    pytest -m "not integration" {posargs:tests}

[testenv:integration]
description = Run integration tests (requires TEST_SOURCE_DSN and TEST_TARGET_DSN)
commands =
    pytest -m integration {posargs:tests/test_integration_hashdiff.py}
